<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コウペンちゃんデータベース（非公式）</title>

  <!-- フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

  <!-- X埋め込み用スクリプト -->
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

  <style>
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background-color: #fdeef4;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #ffcce5;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .disclaimer {
      background-color: #fff0f8;
      padding: 15px;
      font-size: 14px;
      color: #555;
    }

    .search-box {
      margin: 30px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background-color: #ff99cc;
      color: white;
      cursor: pointer;
    }

    .results {
      margin: 20px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    コウペンちゃん データベース
  </header>

  <div class="disclaimer">
    本サイトはコウペンちゃんの非公式ファンサイトです。<br>
    公式および作者様とは一切関係ありません。<br>
    画像は保存せず、Xの埋め込み機能のみを使用しています。
  </div>

  <div class="search-box">
    <input type="text" id="keyword" placeholder="キーワード検索（例：出勤 えらい）">
    <button onclick="searchPosts()">検索</button>
  </div>

  <div class="results" id="results">
    <!-- ここに投稿が表示されます -->
  </div>

  <footer>
    © Fan-made database site
  </footer>

  <script>
    // 仮データ（あとでJSONに分離可能）
    const posts = [
      {
        url: "https://x.com/k_r_r_l_l_/status/849013724111265793",
        tags: ["初投稿"]
      },
      {
        url: "https://x.com/k_r_r_l_l_/status/2028725814729269699",
        tags: ["最新"]
      }
    ];

    function searchPosts() {
      const keyword = document.getElementById("keyword").value;
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      const filtered = posts.filter(post =>
        post.tags.some(tag => tag.includes(keyword))
      );

      if (filtered.length === 0) {
        resultsDiv.innerHTML = "<p>該当する投稿がありません。</p>";
        return;
      }

      filtered.forEach(post => {
        const blockquote = document.createElement("blockquote");
        blockquote.className = "twitter-tweet";

        const link = document.createElement("a");
        link.href = post.url;

        blockquote.appendChild(link);
        resultsDiv.appendChild(blockquote);
      });

      if (window.twttr) {
        window.twttr.widgets.load();
      }
    }
  </script>

</body>
</html>
