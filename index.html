<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コウペンちゃんデータベース（非公式）</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:#fdeef4;
  margin:0;
  text-align:center;
}
header{
  background:#ffcce5;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}
.disclaimer{
  background:#fff0f8;
  padding:15px;
  font-size:14px;
}
.search-box{
  margin:30px;
}
input{
  padding:10px;
  width:260px;
  border-radius:20px;
  border:1px solid #ccc;
}
button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:#ff99cc;
  color:white;
  cursor:pointer;
}
.card{
  background:white;
  margin:20px auto;
  padding:15px;
  width:95%;
  max-width:750px;
  border-radius:20px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  transition:0.2s;
  display:flex;
  gap:15px;
  align-items:flex-start;
}
.card:hover{
  transform:scale(1.02);
}
.thumb{
  width:260px;
  flex-shrink:0;
}
.info{
  flex:1;
  text-align:left;
}
.tags{
  margin-bottom:10px;
  font-size:14px;
  color:#888;
}
.date{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
}
.tag-button{
  display:inline-block;
  margin:4px;
  padding:5px 12px;
  background:#ffe6f2;
  border-radius:15px;
  cursor:pointer;
  font-size:13px;
}
iframe{
  border-radius:15px !important;
}
@media(max-width:768px){
  .card{
    flex-direction:column;
    align-items:center;
  }
  .thumb{
    width:100%;
  }
  .info{
    text-align:center;
  }
}
</style>
</head>

<body>

<header>
コウペンちゃん データベース
</header>

<div class="disclaimer">
本サイトはコウペンちゃんの非公式ファンサイトです。<br>
公式および作者様とは一切関係ありません。<br>
画像は保存せず、Xの埋め込み機能のみを使用しています。
</div>

<div class="search-box">
<input type="text" id="keyword" placeholder="タグ検索">
<button onclick="searchPosts()">検索</button>
</div>

<div id="results"></div>

<script async src="https://platform.twitter.com/widgets.js"></script>

<script>

const posts = [
  {
    url: "https://x.com/i/status/2027876844582920243",
    date: "2026-03-01",
    tags: ["花粉", "大変", "ものだなぁ"]
  },
  {
    url: "https://x.com/i/status/2028259385441726550",
    date: "2026-03-01",
    tags: ["のんびり日和", "団子", "春"]
  },
  {
    url: "https://x.com/i/status/2028638048502866057",
    date: "2026-03-02",
    tags: ["ひなあられ", "ひなーられ", "ひな祭り"]
  },
  {
    url: "https://x.com/i/status/2028725814729269699",
    date: "2026-03-03",
    tags: ["シロフォン", "ハンドシンバル", "楽器", "はなまるライフ"]
  }
];

displayPosts(posts);

function searchPosts(){
  const keyword = document.getElementById("keyword").value.trim();
  if(!keyword){
    displayPosts(posts);
    return;
  }
  const filtered = posts.filter(p =>
    p.tags.some(tag => tag.includes(keyword))
  );
  displayPosts(filtered);
}

function displayPosts(list){
  const container = document.getElementById("results");
  container.innerHTML = "";

  list.forEach(post=>{
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => {
      window.open(post.url, "_blank");
    };

    /* 左：X埋め込み（サムネ風） */
    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const blockquote = document.createElement("blockquote");
    blockquote.className = "twitter-tweet";
    blockquote.setAttribute("data-width", "260");

    const a = document.createElement("a");
    a.href = post.url;

    blockquote.appendChild(a);
    thumb.appendChild(blockquote);

    /* 右：情報 */
    const info = document.createElement("div");
    info.className = "info";

    const tagsDiv = document.createElement("div");
    tagsDiv.className = "tags";

    post.tags.forEach(tag=>{
      const tagBtn = document.createElement("span");
      tagBtn.className = "tag-button";
      tagBtn.textContent = tag;
      tagBtn.onclick = (e) => {
        e.stopPropagation();
        document.getElementById("keyword").value = tag;
        searchPosts();
      };
      tagsDiv.appendChild(tagBtn);
    });

    const dateDiv = document.createElement("div");
    dateDiv.className = "date";
    dateDiv.textContent = "投稿日: " + post.date;

    info.appendChild(tagsDiv);
    info.appendChild(dateDiv);

    card.appendChild(thumb);
    card.appendChild(info);
    container.appendChild(card);
  });

  if(window.twttr){
    window.twttr.widgets.load();
  }
}

</script>

</body>
</html>
